name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sunfabb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sunfabb_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint "{src,apps,libs,test}/**/*.ts"

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npm run test:cov

      - name: Apply migrations to a fresh database
        run: npx prisma migrate deploy

      - name: E2e tests (self-contained specs only — see D28)
        run: npm run test:e2e -- test/compression.e2e-spec.ts

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sunfabb_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sunfabb_e2e
      # Test-only credentials, never used outside this ephemeral CI database.
      ADMIN_EMAIL: admin@sunfabb.com
      ADMIN_PASSWORD_HASH: "$2b$10$9CEKsC6jEirw8PyvwAlFcOCzalNHsvy9tSki0DyeOSqYUxt/BzrgW"
      E2E_ADMIN_PASSWORD: TestPassword123!
      FRONTEND_URL: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:3000
      PORT: 3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Migrate and seed the e2e database
        working-directory: backend
        run: |
          npx prisma migrate deploy
          npx prisma db seed

      - name: Start backend
        working-directory: backend
        run: nohup npm run start:prod > /tmp/backend.log 2>&1 &

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Start frontend
        working-directory: frontend
        run: nohup npm run start -- -p 3001 > /tmp/frontend.log 2>&1 &

      - name: Wait for both apps to respond
        run: |
          npx wait-on@latest http://localhost:3000/categories http://localhost:3001 --timeout 60000

      - name: Install Playwright
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run e2e suite
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            /tmp/backend.log
            /tmp/frontend.log
          retention-days: 7

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npm run test:cov
