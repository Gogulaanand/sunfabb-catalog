model = "gpt-5.6-sol"
model_reasoning_effort = "low"

[agents]
max_threads = 4
max_depth = 1

[agents.design_worker]
description = "Own one Catalog textile design end to end: verify inputs, generate swatches and scenes, visually self-review, and report to the design-gen orchestrator."
config_file = "./agents/design-worker.toml"
nickname_candidates = ["Loom-A", "Loom-B", "Loom-C", "Loom-D"]

[mcp_servers.chakra-ui]
command = "npx"
args = [
    "-y",
    "@chakra-ui/react-mcp",
]

[mcp_servers.context7]
command = "npx"
args = [
    "-y",
    "@upstash/context7-mcp",
]

[mcp_servers.filesystem]
command = "npx"
args = [
    "-y",
    "@modelcontextprotocol/server-filesystem",
    "/Users/gogulaanand",
]

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.razorpay]
url = "https://mcp.razorpay.com/mcp"

# Set this environment variable to the full value: Basic <base64(key_id:key_secret)>.
[mcp_servers.razorpay.env_http_headers]
Authorization = "RAZORPAY_MCP_AUTHORIZATION"

[mcp_servers.render]
url = "https://mcp.render.com/mcp"
bearer_token_env_var = "RENDER_API_KEY"

[mcp_servers.vercel]
url = "https://mcp.vercel.com"
